<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: { DEFAULT: '#0FB5A8', dark: '#0A1929' },
              ink: '#1F2937',
              page: '#F7F7F5',
            },
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
            },
          },
        },
      };
    </script>

    <script
      src="https://unpkg.com/htmx.org@1.9.12"
      integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2"
      crossorigin="anonymous"
    ></script>

    <style>
      body { font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif; }
    </style>
  </head>
  <body class="min-h-screen bg-page text-ink antialiased">
    <header class="border-b border-slate-200/70 bg-white/60 backdrop-blur-sm">
      <div class="mx-auto flex max-w-4xl items-center justify-between px-6 py-3">
        <p class="text-xs font-semibold uppercase tracking-[0.18em] text-brand-dark">
          Hendon Signal Agent <span class="text-slate-400">·</span> Admin
        </p>
        <nav class="hidden gap-6 text-xs font-medium text-slate-500 sm:flex">
          <a href="/" class="hover:text-brand-dark">Dashboard</a>
          <a href="/admin/upload" class="hover:text-brand-dark">Upload TAM</a>
          <a href="/admin/settings" class="hover:text-brand-dark">Settings</a>
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-4xl px-6 py-10">
      {{CONTENT}}
    </main>
  </body>
</html>
